<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtuber</title>
    <style>
        body,html {
            height: 100%;
            overflow-y: auto;
        }

        body {
            overflow-y: scroll;
        }

        body::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        * {
            padding: 0;
            margin: 0;
        }
        img {
            width: 100vw;
        }
        a {
            display: block;
            background-color: darkred;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bolder;
            text-decoration: none;
            transition: all 0.5s;
        }
        
        a:hover {
            background-color: red;
        }
    </style>
</head>
<body>
    <img src="imagens/tela-youtube.png" alt="youtube">
    <a href="https://www.youtube.com/watch?v=uhPB_rQ7jnQ&list=RDNmvVhovjJI0&index=2" target="_blank">Acessar</a>
</body>
</html>
