<!DOCTYPE html>
<html lang="pt-brn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body, html {
            height: 100%;
            overflow-y: auto;
        }

        body {
            overflow-y: scroll;
        }

        body::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        * {
            margin: 0px;
            padding: 0px;
        }

        img {
            width: 100vw;
        }

        a {
            display: block;
            text-align: center;
            padding: 30px;
            color: white;
            background-color: darkred;
            text-decoration: none;
            font-weight: bolder;
            transition: all 0.5s;
        }

        a:hover {
            background: red;
        }
    </style>
</head>
<body>
    <img src="imagens/tela-instagram.jpg" alt="instagram">
    <a href="https://www.instagram.com/davi.z4h/" target="_blank">Acessar</a>
</body>
</html>
