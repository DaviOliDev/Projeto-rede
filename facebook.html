<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>
        body, html {
            height: 100%;
            overflow-y: auto;
        }

        body {
            overflow-y: scroll;
        }

        body::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        * {
            padding: 0px;
            margin: 0px;
        }

        img {
            width: 100vw;
        }

        a {
            display: block;
            padding: 30px;
            background: darkred;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bolder;
            transition: all 0.5s;
        }

        a:hover {
            background-color: red;
        }
    </style>
</head>
<body>
    <img src="imagens/tela-facebook.jpg" alt="facebook">
    <a href="https://www.facebook.com/CursosEmVideo/videos/" target="_blank">Acessar</a>
</body>
</html>
