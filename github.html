<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github</title>
    <style>
        body,html {
            height: 100%;
            overflow-y: auto;
        }

        body {
            overflow-y: scroll;
        }
        
        body::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        * {
            padding: 0px;
            margin: 0px;
        }

        img {
            width: 100vw;
        }

        a {
            display: block;
            padding: 30px;
            background: darkred;
            text-decoration: none;
            text-align: center;
            font-weight: bolder;
            color: white;
            transition: all 0.5s;
        }

        a:hover {
            background: red;
        }
    </style>
</head>
<body>
    <img src="imagens/tela-github.jpg" alt="github">
    <a href="https://github.com/DaviOliDev" target="_blank">Acessar</a>
</body>
</html>
